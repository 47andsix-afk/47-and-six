<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>47-&-SIX // Inventory Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="brand">47-&-SIX</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="portal.html">Portal</a>
      <a href="login.html?next=inventory.html">Login</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="menu_builder.html">Menu</a>
      <a href="event_booking.html">Events</a>
      <a href="operations_console.html">Console</a>
      <a href="chef_portfolio.html">Portfolio</a>
      <a href="chef_credentials.html">Chef</a>
    </div>
  </nav>

  <main class="page-main">
    <header class="page-header">
      <h1>Inventory Manager</h1>
      <p>Review ingredient status, low stock risks, and reorder recommendations.</p>
    </header>

    <section class="form-panel">
      <div class="form-group">
        <label for="items">Inventory Items</label>
        <textarea id="items" placeholder="Enter inventory items, one per line..."></textarea>
      </div>
      <button class="button-primary" onclick="runInventory()">CHECK INVENTORY</button>
      <pre id="inv-output" style="margin-top:24px; background:#090909; color:#f1f1f1; padding:24px; border-radius:8px;"></pre>
    </section>
  </main>

  <footer>
    <div class="brand">47-&-SIX</div>
    <p>Inventory checks for kitchen and catering operations.</p>
  </footer>

  <script>
    const API_BASE = 'http://127.0.0.1:8000';
    const TOKEN_KEY = 'auth_token';

    async function runInventory() {
      const items = document.getElementById('items').value.split('\n').filter(Boolean);
      const output = document.getElementById('inv-output');
      const token = localStorage.getItem(TOKEN_KEY);

      if (!token) {
        output.textContent = 'Login required. Redirecting...';
        window.setTimeout(() => {
          window.location.href = 'login.html?next=inventory.html';
        }, 400);
        return;
      }

      const res = await fetch(`${API_BASE}/inventory`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ items })
      });
      const data = await res.json();
      output.textContent = data.inventory || data.detail || 'Request failed.';
    }
  </script>
</body>
</html>
