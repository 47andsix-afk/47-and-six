<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>47-&-SIX // Chef Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="brand">47-&-SIX</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="portal.html">Portal</a>
      <a href="login.html?next=dashboard.html">Login</a>
      <a href="menu_builder.html">Menu</a>
      <a href="event_booking.html">Events</a>
      <a href="inventory.html">Inventory</a>
      <a href="operations_console.html">Console</a>
      <a href="chef_portfolio.html">Portfolio</a>
      <a href="chef_credentials.html">Chef</a>
    </div>
  </nav>

  <main class="page-main">
    <header class="page-header">
      <h1>Chef Dashboard</h1>
      <p>Generate executive summaries, margin guidance, and operational actions for chef-driven events.</p>
    </header>

    <section class="form-panel">
      <div class="form-group">
        <label for="dash-user">Dashboard Login</label>
        <input id="dash-user" type="text" placeholder="Username" autocomplete="username" />
        <input id="dash-pass" type="password" placeholder="Password" autocomplete="current-password" />
      </div>
      <button class="button-primary" onclick="loginDashboard()">LOGIN</button>

      <div class="form-group">
        <label for="dash-input">Dashboard Inquiry</label>
        <textarea id="dash-input" placeholder="Enter a query for the chef dashboard..."></textarea>
      </div>
      <button class="button-primary" onclick="runDashboard()">RUN DASHBOARD</button>
      <pre id="dash-output" style="margin-top:24px; background:#090909; color:#f1f1f1; padding:24px; border-radius:8px;"></pre>
    </section>
  </main>

  <footer>
    <div class="brand">47-&-SIX</div>
    <p>Chef operations dashboard for menu, staffing, and inventory planning.</p>
  </footer>

  <script>
    const API_BASE = 'http://127.0.0.1:8000';
    const TOKEN_KEY = 'auth_token';

    async function loginDashboard() {
      const username = document.getElementById('dash-user').value.trim();
      const password = document.getElementById('dash-pass').value;
      const output = document.getElementById('dash-output');

      if (!username || !password) {
        output.textContent = 'Enter username and password before logging in.';
        return;
      }

      output.textContent = 'Logging in...';

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        if (!res.ok || !data.access_token) {
          output.textContent = data.detail || 'Login failed.';
          return;
        }

        localStorage.setItem(TOKEN_KEY, data.access_token);
        output.textContent = 'Login successful. You can now run dashboard inquiries.';
      } catch (err) {
        output.textContent = `Login error: ${err.message}`;
      }
    }

    async function runDashboard() {
      const msg = document.getElementById('dash-input').value.trim();
      const output = document.getElementById('dash-output');
      const token = localStorage.getItem(TOKEN_KEY);

      if (!msg) {
        output.textContent = 'Enter a dashboard inquiry first.';
        return;
      }

      if (!token) {
        output.textContent = 'Login required. Redirecting to the login page...';
        window.setTimeout(() => {
          window.location.href = 'login.html?next=dashboard.html';
        }, 400);
        return;
      }

      output.textContent = 'Running dashboard inquiry...';

      try {
        const res = await fetch(`${API_BASE}/chef-dashboard`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ message: msg })
        });

        const data = await res.json();
        if (!res.ok) {
          const detail = data.detail || `Request failed with status ${res.status}.`;
          if (res.status === 401) {
            localStorage.removeItem(TOKEN_KEY);
          }
          output.textContent = detail;
          return;
        }

        output.textContent = data.dashboard || JSON.stringify(data, null, 2);
      } catch (err) {
        output.textContent = `Dashboard error: ${err.message}`;
      }
    }
  </script>
</body>
</html>
