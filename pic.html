<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>47-&-SIX // Plate Gallery</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b21;
      --text: #f4f6fa;
      --muted: #a6afbd;
      --line: #2a2f39;
      --accent: #f6b74a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 0%, #1d2430, var(--bg));
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      letter-spacing: 1px;
      font-size: clamp(1.4rem, 2.3vw, 2rem);
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .back {
      text-decoration: none;
      color: #111;
      background: var(--accent);
      border: 1px solid #00000033;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    figure {
      margin: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }

    img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      background: #0b0d12;
    }

    figcaption {
      padding: 10px 12px;
      color: var(--muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--line);
    }

    @media (max-width: 540px) {
      img {
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>PLATE GALLERY</h1>
        <p class="sub">Your local food photos displayed directly on the site.</p>
      </div>
      <a class="back" href="index.html">Back To Home</a>
    </div>

    <section class="grid" aria-label="Plate photos">
      <figure>
        <img src="80e2b063-93d5-4a8f-bf27-32c59a227be6.jpg" alt="Chef plate photo 1" loading="lazy" />
        <figcaption>Plate 01</figcaption>
      </figure>

      <figure>
        <img src="pics_files/IMG_0293.jpg" alt="Chef plate photo 2" loading="lazy" />
        <figcaption>Plate 02</figcaption>
      </figure>

      <figure>
        <img src="pics_files/unnamed.png" alt="Chef plate photo 3" loading="lazy" />
        <figcaption>Plate 03</figcaption>
      </figure>

      <figure>
        <img src="pics_files/Gemini_Generated_Image_1g24t11g24t11g24.png" alt="Chef plate photo 4" loading="lazy" />
        <figcaption>Plate 04</figcaption>
      </figure>

      <figure>
        <img src="pics_files/Gemini_Generated_Image_4rhroz4rhroz4rhr.png" alt="Chef plate photo 5" loading="lazy" />
        <figcaption>Plate 05</figcaption>
      </figure>
    </section>
  </main>
</body>
</html>
