<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>47-&-SIX // Menu Builder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="brand">47-&-SIX</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="portal.html">Portal</a>
      <a href="login.html?next=menu_builder.html">Login</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="event_booking.html">Events</a>
      <a href="inventory.html">Inventory</a>
      <a href="operations_console.html">Console</a>
      <a href="chef_portfolio.html">Portfolio</a>
      <a href="chef_credentials.html">Chef</a>
    </div>
  </nav>

  <main class="page-main">
    <header class="page-header">
      <h1>Menu Builder</h1>
      <p>Estimate ingredient cost, price per portion, and chef menu economics.</p>
    </header>

    <section class="form-panel">
      <div class="form-group">
        <label for="ingredients">Ingredients</label>
        <textarea id="ingredients" placeholder="Enter ingredients, one per line..."></textarea>
      </div>
      <div class="form-group">
        <label for="portions">Portions</label>
        <input id="portions" type="number" placeholder="Number of portions" />
      </div>
      <button class="button-primary" onclick="costMenu()">CALCULATE COST</button>
      <pre id="menu-output" style="margin-top:24px; background:#090909; color:#f1f1f1; padding:24px; border-radius:8px;"></pre>
    </section>
  </main>

  <footer>
    <div class="brand">47-&-SIX</div>
    <p>Menu pricing guidance for private chef services.</p>
  </footer>

  <script>
    const API_BASE = 'http://127.0.0.1:8000';
    const TOKEN_KEY = 'auth_token';

    async function costMenu() {
      const ingredients = document.getElementById('ingredients').value.split('\n').filter(Boolean);
      const portions = parseInt(document.getElementById('portions').value, 10) || 0;
      const output = document.getElementById('menu-output');
      const token = localStorage.getItem(TOKEN_KEY);

      if (!token) {
        output.textContent = 'Login required. Redirecting...';
        window.setTimeout(() => {
          window.location.href = 'login.html?next=menu_builder.html';
        }, 400);
        return;
      }

      const res = await fetch(`${API_BASE}/menu-cost`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ ingredients, portions })
      });
      const data = await res.json();
      output.textContent = data.menu_cost || data.detail || 'Request failed.';
    }
  </script>
</body>
</html>
