<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>47-&-SIX // Operations Console</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="brand">47-&-SIX</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="portal.html">Portal</a>
      <a href="login.html?next=operations_console.html">Login</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="menu_builder.html">Menu</a>
      <a href="event_booking.html">Events</a>
      <a href="inventory.html">Inventory</a>
      <a href="chef_portfolio.html">Portfolio</a>
      <a href="chef_credentials.html">Chef</a>
    </div>
  </nav>

  <main class="page-main">
    <header class="page-header">
      <h1>Operations Console</h1>
      <p>Send custom prompts, tools requests, JSON mode, embeddings, and dashboard queries.</p>
    </header>

    <section class="form-panel">
      <div class="form-group">
        <label for="ops-input">Operational Command</label>
        <textarea id="ops-input" placeholder="Enter a command for operations or AI tools..."></textarea>
      </div>
      <div class="page-grid page-grid-2">
        <button class="button-primary" onclick="runTools()">RUN TOOLS</button>
        <button class="button-secondary" onclick="runJSON()">JSON MODE</button>
        <button class="button-secondary" onclick="runEmbed()">EMBED RULE</button>
        <button class="button-primary" onclick="runDashboard()">CHEF DASHBOARD</button>
      </div>
      <pre id="ops-output" style="margin-top:24px; background:#090909; color:#f1f1f1; padding:24px; border-radius:8px;"></pre>
    </section>
  </main>

  <footer>
    <div class="brand">47-&-SIX</div>
    <p>Operations tooling for chef workflow and agent orchestration.</p>
  </footer>

  <script>
    const API_BASE = 'http://127.0.0.1:8000';
    const TOKEN_KEY = 'auth_token';

    function getTokenOrRedirect() {
      const token = localStorage.getItem(TOKEN_KEY);
      if (!token) {
        document.getElementById('ops-output').textContent = 'Login required. Redirecting...';
        window.setTimeout(() => {
          window.location.href = 'login.html?next=operations_console.html';
        }, 400);
        return null;
      }
      return token;
    }

    async function runTools() {
      const msg = document.getElementById('ops-input').value;
      const token = getTokenOrRedirect();
      if (!token) return;

      const res = await fetch(`${API_BASE}/tools`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      document.getElementById('ops-output').textContent = data.raw || data.detail || 'Request failed.';
    }

    async function runJSON() {
      const msg = document.getElementById('ops-input').value;
      const token = getTokenOrRedirect();
      if (!token) return;

      const res = await fetch(`${API_BASE}/json`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      document.getElementById('ops-output').textContent = data.json || data.detail || 'Request failed.';
    }

    async function runEmbed() {
      const msg = document.getElementById('ops-input').value;
      const token = getTokenOrRedirect();
      if (!token) return;

      const res = await fetch(`${API_BASE}/embed`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ text: msg, id: 'custom_rule' })
      });
      const data = await res.json();
      document.getElementById('ops-output').textContent = JSON.stringify(data, null, 2);
    }

    async function runDashboard() {
      const msg = document.getElementById('ops-input').value;
      const token = getTokenOrRedirect();
      if (!token) return;

      const res = await fetch(`${API_BASE}/chef-dashboard`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      document.getElementById('ops-output').textContent = data.dashboard || data.detail || 'Request failed.';
    }
  </script>
</body>
</html>
