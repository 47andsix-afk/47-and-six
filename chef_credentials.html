<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>47-&-SIX // Chef Credentials</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="brand">47-&-SIX</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="menu_builder.html">Menu</a>
      <a href="event_booking.html">Events</a>
      <a href="inventory.html">Inventory</a>
      <a href="operations_console.html">Console</a>
      <a href="chef_portfolio.html">Portfolio</a>
    </div>
  </nav>

  <main class="page-main">
    <header class="page-header">
      <h1>Chef Credentials</h1>
      <p>Executive chef profile and core focus areas for the platform.</p>
    </header>

    <section class="form-panel">
      <h2 id="chef-name">Loading...</h2>
      <p id="chef-title"></p>
      <div class="page-grid page-grid-2">
        <div>
          <h3>Education</h3>
          <ul id="chef-edu"></ul>
        </div>
        <div>
          <h3>Focus Areas</h3>
          <ul id="chef-focus"></ul>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="brand">47-&-SIX</div>
    <p>Chef profile and service expertise overview.</p>
  </footer>

  <script type="module">
    import { getChefCredentials } from './script.js';

    window.onload = async () => {
      const data = await getChefCredentials();
      document.getElementById('chef-name').innerText = data.name || 'Chef Jesse';
      document.getElementById('chef-title').innerText = data.title || 'Executive Chef';
      const edu = document.getElementById('chef-edu');
      (data.education || []).forEach(item => {
        const li = document.createElement('li');
        li.innerText = item;
        edu.appendChild(li);
      });
      const focus = document.getElementById('chef-focus');
      (data.focus || []).forEach(item => {
        const li = document.createElement('li');
        li.innerText = item;
        focus.appendChild(li);
      });
    };
  </script>
</body>
</html>
